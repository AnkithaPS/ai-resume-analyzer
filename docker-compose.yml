version: "3.8"
services:
  app:
    build: .
    container_name: resume-app
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app
      - /app/node_modules
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
